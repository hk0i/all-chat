# Repo compose: builds the local Dockerfile so a clone runs its own code.
# Production variant (pull the published image instead) is in the README.
services:
  allchat:
    build: .
    expose:
      - "3000"
    ports:
      - "8420:3000" # direct access for setups without nginx-proxy
    environment:
      VIRTUAL_HOST: ${ALLCHAT_HOST:-all-chat.localhost}
      VIRTUAL_PORT: "3000"
    volumes:
      - allchat-data:/data
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-proxy_network}

volumes:
  allchat-data:
