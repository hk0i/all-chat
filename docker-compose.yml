# Repo compose: builds the local Dockerfile so a clone runs its own code.
# Production variant (pull the published image instead) is in the README.
services:
  allchat:
    build: .
    expose:
      - "3000"
    ports:
      - "8420:3000" # direct access for setups without nginx-proxy
    environment:
      VIRTUAL_HOST: ${ALLCHAT_HOST:-all-chat.localhost}
      VIRTUAL_PORT: "3000"
      # Kick rotates its public Pusher key occasionally; override without a
      # code change (see docs/EDD.md §3.2). Empty = use built-in defaults.
      KICK_PUSHER_KEY: ${KICK_PUSHER_KEY:-}
      KICK_PUSHER_HOST: ${KICK_PUSHER_HOST:-}
      # Platform OAuth (docs/EDD-V2.md §3) — connecting Twitch/YouTube unlocks
      # sending messages through them; reading works anonymously without these.
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - allchat-data:/data
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-proxy_network}

volumes:
  allchat-data:
